<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMDash</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="d-flex">

<div class="bg-black p-3 vh-100" style="width:260px;">
  <h4>AfriDigital</h4>
  <ul class="nav flex-column mt-4">
    <li><a class="nav-link text-light" href="/dashboard">Overview</a></li>
    <li><a class="nav-link text-primary" href="#">Monitoring</a></li>
    <li><a class="nav-link text-danger" href="#">Security</a></li>
    <li><a class="nav-link text-success" href="/afrilove">AfriLove</a></li>
  </ul>
</div>

<div class="flex-grow-1 p-4">
  <h2>FMDash Live Dashboard</h2>

  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card bg-primary text-white p-3">
        <h5>CPU</h5>
        <h3 id="cpu">--</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-info text-white p-3">
        <h5>Memory</h5>
        <h3 id="memory">--</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-secondary text-white p-3">
        <h5>Uptime</h5>
        <h3 id="uptime">--</h3>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card bg-danger text-white p-3">
        <h5>Security Status</h5>
        <h3 id="securityStatus">--</h3>
      </div>
    </div>
  </div>

</div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
